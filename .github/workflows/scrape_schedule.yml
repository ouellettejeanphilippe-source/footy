name: Daily ESPN Schedule Scraper

on:
  schedule:
    - cron: '0 10 * * *' # 10:00 UTC = 6:00 AM EST
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Scraper
        run: node scripts/scrape_schedule.mjs

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily ESPN schedule cache"
          file_pattern: "data/schedule.json"
