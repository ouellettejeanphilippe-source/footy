<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sports Guide">
<link rel="manifest" href="./manifest.json">
<title>Sports Guide</title>





<style>
.mv-dd-item {
    background: transparent;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 13px;
    text-align: left;
    width: 100%;
}
.mv-dd-item:hover {
    background: rgba(255,255,255,0.1);
}
.mv-dd-item span {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 20px;
    font-size: 14px;
    filter: brightness(0) invert(1);
}
</style>

<script>
window.toggleMvDropdown = function(e, idx) {
    e.stopPropagation();
    e.preventDefault();
    var menu = document.getElementById('mv-dd-menu-' + idx);
    if (!menu) return;

    var isVisible = menu.style.display === 'flex';

    var allMenus = document.querySelectorAll('.mv-dd-menu');
    allMenus.forEach(function(m) { m.style.display = 'none'; });

    if (!isVisible) {
        menu.style.display = 'flex';
    }
};

document.addEventListener('click', function(e) {
    if (!e.target.closest('.mv-dd-btn') && !e.target.closest('.mv-dd-menu')) {
        var allMenus = document.querySelectorAll('.mv-dd-menu');
        allMenus.forEach(function(m) { m.style.display = 'none'; });
    }
});
</script>
